services:
  - type: web
    name: anatolia-q-frontend
    runtime: static
    plan: free
    autoDeployTrigger: commit
    buildCommand: mkdir -p dist && cp index.html dist/index.html
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
